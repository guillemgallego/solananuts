name: CI · Build check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cloudflare Pages se encarga del deploy automático.
# Este workflow solo verifica que el build de Astro no rompe.

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist output
        run: |
          echo "Páginas generadas:"
          find dist -name "*.html" | wc -l
          echo "Sitemap:"
          ls dist/sitemap*.xml 2>/dev/null && echo "OK" || echo "No encontrado"

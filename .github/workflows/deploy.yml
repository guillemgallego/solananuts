name: Deploy · Solana Nuts

on:
  push:
    branches:
      - master          # dispara en cada push a master
  workflow_dispatch:    # también permite lanzarlo a mano desde la UI de GitHub

concurrency:
  group: deploy-production
  cancel-in-progress: true  # si hay un deploy en curso, lo cancela y arranca el nuevo

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1 — Código fuente
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Node.js (versión LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3 — Dependencias
      - name: Install dependencies
        run: npm ci

      # 4 — Build estático de Astro → dist/
      - name: Build Astro
        run: npm run build

      # 5 — Clave SSH (la añades en Settings → Secrets → Actions)
      - name: Setup SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key:             ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts:     ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists:   replace

      # 6 — Rsync: sube solo lo que cambió, borra lo que ya no existe
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || '22' }}" \
            dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_DEPLOY_PATH }}

      # 7 — Notificación de éxito (opcional)
      - name: Deploy complete
        run: echo "✅ Solana Nuts desplegado en ${{ secrets.SSH_HOST }}"
